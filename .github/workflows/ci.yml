name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  python-tests:
    name: Python Phase 1 + 2 + 3 Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements-lock.txt
        working-directory: python

      - name: Run Phase 1 SDT tests
        run: python -m pytest test_phase1_sdt.py -v
        working-directory: python

      - name: Run Phase 2 sampler tests
        run: python -m pytest test_phase2_sampler.py -v
        working-directory: python

      - name: Run Phase 3 hierarchical tests
        run: python -m pytest test_phase3_hierarchical.py -v
        working-directory: python

  clojure-docker:
    name: Clojure Tests via Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Clojure tests in Docker
        run: docker run --rm -v "$PWD":/work -w /work clojure:temurin-21-tools-deps clojure -M:test
